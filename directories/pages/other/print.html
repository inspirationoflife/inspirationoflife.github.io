<tar>Председателю призывной комиссии Лоухского района<br>от Батугина Тимофея Михайловича<br>06.02.2007 г. р.<br>Респ. Карелия, Лоухский р-н, пгт. Чупа, ул. Коргуева, д. 5, кв. 49<br>89250669477</tar>
<hc>Заявление</hc>
<p>Я люблю свой народ и свою страну. Но в связи с состоянием моего здоровья я не вижу возможным прохождение мною воинской службы.</p>
<p>По причине компрессионного перелома трёх позвонков ГОП мне запрещены бег, прыжки, кувырки; показан грудо-поясничный корсет и воротник Шанца. На МРТ у меня обнаружена киста в головном мозге размером примерно со спичечный коробок, а согласно статьям 8, 9, 10, 23, 24 Расписания болезней если киста в голове вызывает серьёзные нарушения, такие как головные боли, головокружение, проблемы со зрением, координацией (синкопальные состояния), это является основанием для присвоения группы годности «В» или «Д». Также в моей амбулаторной карте имеются сведения о том, что у меня есть заболевание зрения, которое может привести к слепоте.</p>
<p>На основании вышеизложенного прошу уважаемую комиссию присвоить мне группу годности «В» или «Д».</p>

<p>Здравствуйте. Меня зовут Тимофей Батугин. У меня диагностирован копрессионный перелом трёх позвонков грудного отдела. Я часто падаю в обмороки. С двухлетнего возраста я живу с отцом. По словам папы, первый раз я потерял сознание в 7 лет на жд вокзале и очнулся уже в поезде. В то время папа работал на двух работах, и я был то с няней, то с бабушкой, поэтому папа не придавал моему состоянию особого значения. Потом однажды в выходной я упал в обморок при папе. Это было в 2018 году. Тогда он решил, что нужно сходить к невропатологу (справка об этом имеется). Кроме того, в детстве я часто ударялся головой, о чём также имеются справки).</p>
<p>За последние 5 лет я падал в обморок не менее 10-ти раз. Начиная с 2023 года обмороки участились. Как говорит мой отец, пару раз у меня было немного пены по углам рта. В январе, в этом году, я упал в обморок в Церкви. Там были две учительницы, которые это видели. Когда я очнулся, вокруг меня стояли люди, и какая-то бабушка давала мне понюхать нашатырный спирт. Потом какая-то женщина вывела меня из храма и дала полежать в своей машине. Скорую помощь мне никто не вызвал. Мне предложили оставшееся время службы посидеть на стульчике, и я согласился.</p>
<p>В течение этого года я падал в обморок ещё несколько раз. В августе я поехал кататься на велосипеде и отключился на проезжей части. Когда я очнулся, то понял, что меня снесло направо и я лежал в кювете. Я очень сильно испугался, потому что представил, что мог бы упасть на встречную полосу и меня бы переехала машина. Потом, в следующий раз, я был в своей комнате, а папа позвал меня на кухню. Когда я шёл к нему, я почуствовал, что у меня кружится голова. Чтобы не упасть, я начал садиться на стул, но тут же вырубился и очнулся уже лёжа на полу. Папа в это время вызывал скорую. Потом он сказал мне, что во время падения я ударился головой об стол. Я ходил на скорую и просил предоставить мне выписку всех моих вызовов, но они отказали. Я написал на них заявление в полицию и сейчас оно находится в прокуратуре на рассмотрении.</p>
<p>Также, в последние два года обучения в школе у меня начала ухудшаться память. 11 класс я закончил без троек, но так никуда и не поступил, потому что боялся, что не смогу запоминать учебный материал. Папа сказал мне: «Раз не поступил, устраивайся на работу». Я устроился в ЖЭК разнорабочим, но мне было очень сложно просыпаться утром, так как обычно я сплю по 12-14 часов в сутки, так что три раза я даже проспал на работу. После этого я снова пошёл к невропатологу по месту жительства (в Чупе), и он направил меня к Вам, сказав, что нужно исключить или подтвердить эпилепсию.</p>
<tar>Председателю призывной комиссии Лоухского района<br>от Батугина Тимофея Михайловича<br>06.02.2007 г. р.<br>Респ. Карелия, Лоухский р-н, пгт. Чупа, ул. Коргуева, д. 5, кв. 49<br>89250669477</tar>
<hc>Заявление</hc>
<p>Прошу заменить мне срочную службу по призыву альтернативной гражданской службой, так как несение воинской службы противоречит моему вероисповеданию.</p>
<p>В связи с тем, что я верую в Бога и являюсь православным христианином, я не могу приносить присягу в её современном виде, поскольку она построена в форме клятвы и в ней прямо присутствуют слова: «клянусь… клянусь…», а Слово Божие (Святая Библия) и действующие каноны Церкви прямо запрещают давать всякую клятву (Мф. 5:33-37, Иак. 5:12, Васил. Вел. 29). О том же говорят и святые отцы Церкви, такие как Иоанн Златоуст, Григорий Богослов, Ефрем Сирин, Нил Синайский, Исидор Пелусиот и другие.</p>
<p>Кроме того, как христианин, я также не имею права брать в руки оружие с целью убийства человека (Мф. 5:21-22, Мф. 5:38-39, Мф. 5:43-44, Мф. 26:52, Лк. 9:56, 1Ин. 3:15, Рим. 12:17-21, Откр. 13:10, I Всел. 12, Васил. Вел. 8, Васил. Вел. 13, Васил. Вел. 43, Васил. Вел. 55).</p>
<p>Я люблю свою страну и свой народ и поэтому, в случае угрозы им, если будет на то воля Божия, я не отрекаюсь от жертвенного несения службы, но в форме, не противоречащей моей вере, а именно только по гражданской и гуманитарным специальностям: санитаром, подсобником и т. д., что не связано с убийством людей (т. е. не быть заряжающим, ни корректировщиком огня и т. д.).</p>
<p>Право на альтернативную гражданскую службу гарантируется государственными законами (Конституция РФ ст. 59 ч. 3, ФЗ №113 ст. 2, ФЗ №125 ст. 3 ч. 4, МПГПП ст. 18 ч. 3, ЕКПЧ ст. 9 ч. 2).</p>
<p>К настоящему заявлению прилагаю следующие документы:</p>
<ul>
<li>Характеристика</li>
<li>Автобиография</li>
</ul>
<p>С молитвой о властях и воинстве.</p>

<p>Я единственный ребёнок в семье. Родился 6 февраля 2007 года в г. Видное Московской области. Там на втором дне жизни меня крестил иерей о. Димитрий (Довбыш). Мои родители развелись, когда мне было 2 года, и федеральный суд города Реутов Московской области решил оставить меня жить с отцом.</p>
<p>Мой отец: Батугин Михаил Сергеевич, 14.11.1965 г. р., с детства приучал меня к вере в Бога, за что я ему очень благодарен. До 2009 года проживал в рп. Малино Московской области. С 2009 по 2020 годы проживал в г. Ступино Московской области, где учился в МБОУ СОШ №8 до седьмого класса. Не меньше трёх раз в месяц посещал Троицкий храм в селе Лужники Ступинского района, настоятелем которого является протоиерей о. Игорь (Горячев), и участвовал в Таинствах: исповедовался, причащался.</p>
<p>После первого и второго класса был в христианском православном детском трудовом лагере-стане в честь священномученика Климента Анкирского (память - 5 февр.) в Алтайском крае. На эту тему делал проект «Как я провёл лето 2015 г.». Пребывание в этом лагере оказало значительное влияние на формирование моего мировоззрения, в том числе это касается убеждений, изложенных в заявлении.</p>
<p>В 2020 году переехал с отцом в пгт. Чупа Лоухского района Республики Карелия, где с седьмого по одиннадцатый классы обучался в МБОУ Чупинской СОШ.</p>
--
<p>Батугин Тимофей Михайлович, 06.02.2007 г. р., проживает в пгт. Чупа с 2020 года. Закончил МБОУ Чупинская СОШ. Православный, верующий. Храм посещает нерегулярно. Вредных привычек не имеет.</p>
